name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5433
      DATABASE_NAME: hackathon_test_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd MLH-PE-Hackathon-2026
            git pull origin main

            {
              echo "FLASK_DEBUG=${{ secrets.FLASK_DEBUG }}"
              echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}"
              echo "DATABASE_HOST=${{ secrets.DATABASE_HOST }}"
              echo "DATABASE_PORT=5432"
              echo "DATABASE_USER=${{ secrets.DATABASE_USER }}"
              echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}"
              echo "BETTERSTACK_TOKEN=${{ secrets.BETTERSTACK_TOKEN }}"
              echo "BETTERSTACK_HOST=${{ secrets.BETTERSTACK_HOST }}"
            } > .env

            docker compose up db redis -d
            docker compose build --no-cache web
            docker compose up web -d --scale web=2
            sleep 10
            docker compose stop nginx
            docker compose up nginx -d
            docker compose up fluent-bit -d
